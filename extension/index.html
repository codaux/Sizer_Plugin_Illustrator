<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sizer Illustrator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="panel-shell">
    <section class="hero">
      <div class="hero-copy">
        <p class="eyebrow">Illustrator</p>
        <h1>Sizer</h1>
      </div>
      <div class="quick-inputs">
        <label class="quick-field">
          <span>Folder</span>
        <input id="folder-path" class="field-input mono" type="text" autocomplete="off" spellcheck="false" />
          <span class="field-actions">
          <button id="browse-folder" class="ghost-btn" type="button">Browse</button>
          <button id="paste-folder" class="ghost-btn" type="button">Paste</button>
          </span>
        </label>

        <label class="quick-field">
          <span>Email</span>
        <textarea id="email-text" class="field-input compact-textarea mono" spellcheck="false"></textarea>
          <span class="field-actions">
          <button id="paste-email" class="ghost-btn" type="button">Paste</button>
          </span>
        </label>

        <button id="scan-btn" class="primary-btn" type="button">Scan</button>
      </div>
    </section>

    <section class="settings-row">
      <label class="mini-field">
        <span>Resize</span>
        <select id="resize-mode">
          <option value="respectWidth">Respect Width</option>
          <option value="respectHeight">Respect Height</option>
          <option value="stretch">Stretch</option>
        </select>
      </label>

      <label class="mini-field">
        <span>Print Sort</span>
        <select id="print-type-mode">
          <option value="none">None</option>
          <option value="folder">Folder</option>
          <option value="prefix">Prefix</option>
        </select>
      </label>

      <label class="toggle-field">
        <input id="run-action" type="checkbox" />
        <span>Run WeMust</span>
      </label>

      <label class="mini-field">
        <span>Naming</span>
        <select id="filename-format">
          <option value="qtyFilename">Qty___Filename</option>
          <option value="filename">Filename</option>
          <option value="filenameQty">Filename___Qty</option>
        </select>
      </label>
    </section>

    <section class="toolbar">
      <div class="toolbar-group">
        <button id="clear-btn" class="ghost-btn" type="button">Clear</button>
      </div>
      <div class="toolbar-group">
        <button id="select-all-btn" class="ghost-btn" type="button">All</button>
        <button id="select-green-btn" class="ghost-btn" type="button">Green</button>
        <button id="select-red-btn" class="ghost-btn" type="button">Red</button>
        <button id="select-pending-btn" class="ghost-btn" type="button">Pending</button>
        <button id="select-review-btn" class="ghost-btn" type="button">Review</button>
        <button id="clear-selection-btn" class="ghost-btn" type="button">Clear Sel</button>
      </div>
      <span class="toolbar-spacer"></span>
      <button id="process-btn" class="accent-btn" type="button">Size Selected</button>
      <button id="export-btn" class="primary-btn" type="button">Export Selected</button>
    </section>

    <section class="status-strip">
      <div id="summary-chips" class="summary-chips"></div>
      <div class="status-stack">
        <div id="selection-text" class="meta-text">No rows loaded.</div>
        <div id="status-text" class="status-text">Waiting for input.</div>
      </div>
    </section>

    <section class="table-card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="col-select">Sel</th>
              <th class="col-index">#</th>
              <th class="col-print">Type</th>
              <th>File</th>
              <th class="col-qty">Qty</th>
              <th class="col-size">Order</th>
              <th class="col-size">Output</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="rows-body">
            <tr class="empty-row">
              <td colspan="8">Scan a folder and email to build the list.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <section class="log-panel">
      <div class="log-header">
        <span>Log</span>
        <div class="toolbar-group">
          <button id="copy-log-btn" class="ghost-btn" type="button">Copy</button>
          <button id="clear-log-btn" class="ghost-btn" type="button">Clear Log</button>
        </div>
      </div>
      <textarea id="log-output" class="log-output mono" readonly spellcheck="false"></textarea>
    </section>

    <footer class="panel-footer">
      <span class="plugin-version">v0.2.3</span>
    </footer>
  </main>

  <script src="panel.js"></script>
</body>
</html>
